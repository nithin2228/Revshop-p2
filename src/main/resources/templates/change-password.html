<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main-layout(~{::section})}">
<body>
    <section class="auth-section">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                    <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-warning bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;">
                                <i class="bi bi-key text-warning fs-2"></i>
                            </div>
                            <h2 class="fw-bold mb-1" style="font-family:'Outfit',sans-serif;">Change Password</h2>
                            <p class="text-muted mb-0">Update your account password securely</p>
                        </div>

                        <div id="change-error" class="alert alert-danger d-flex align-items-center gap-2 d-none" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i><span></span>
                        </div>
                        <div id="change-success" class="alert alert-success d-flex align-items-center gap-2 d-none" role="alert">
                            <i class="bi bi-check-circle-fill"></i><span></span>
                        </div>

                        <form id="changePasswordForm" novalidate>
                            <!-- Email (read-only) -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" id="email" name="email" class="form-control bg-light" th:value="${session.userEmail}" readonly>
                                </div>
                            </div>

                            <!-- Old Password -->
                            <div class="mb-3">
                                <label for="oldPassword" class="form-label fw-semibold">Current Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" id="oldPassword" name="oldPassword" class="form-control" placeholder="Your current password" required>
                                    <button class="btn btn-light border" type="button" id="toggleOld"><i class="bi bi-eye text-muted"></i></button>
                                </div>
                                <div class="text-danger small mt-1" id="old-feedback"></div>
                            </div>

                            <!-- New Password -->
                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-semibold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-muted"></i></span>
                                    <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="Min 8 chars with uppercase, number &amp; symbol"
                                           pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&amp;+=_!]).{8,}$" required>
                                    <button class="btn btn-light border" type="button" id="toggleNew"><i class="bi bi-eye text-muted"></i></button>
                                </div>
                                <div class="text-danger small mt-1" id="new-feedback"></div>
                            </div>

                            <!-- Confirm New Password -->
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">Confirm New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-muted"></i></span>
                                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter new password" required>
                                    <button class="btn btn-light border" type="button" id="toggleConfirm"><i class="bi bi-eye text-muted"></i></button>
                                </div>
                                <div class="text-danger small mt-1" id="confirm-feedback"></div>
                            </div>

                            <button type="submit" class="btn btn-warning w-100 py-2 fw-bold fs-6 rounded-3 text-dark">
                                <i class="bi bi-shield-check me-2"></i>Update Password
                            </button>
                            <a th:href="@{/}" class="btn btn-outline-secondary w-100 py-2 fw-bold rounded-3 mt-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const STRONG_PASSWORD_RE = /^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=_!]).{8,}$/;

            function setFeedback(inputId, feedbackId, message) {
                const el = document.getElementById(inputId);
                const fb = document.getElementById(feedbackId);
                if (message) {
                    el.classList.add('is-invalid'); el.classList.remove('is-valid');
                    fb.textContent = message;
                } else if (el.value) {
                    el.classList.remove('is-invalid'); el.classList.add('is-valid');
                    fb.textContent = '';
                } else {
                    el.classList.remove('is-invalid', 'is-valid');
                    fb.textContent = '';
                }
            }

            function validateConfirm() {
                const np = document.getElementById('newPassword').value;
                const cp = document.getElementById('confirmPassword').value;
                if (!cp) { setFeedback('confirmPassword', 'confirm-feedback', ''); return; }
                setFeedback('confirmPassword', 'confirm-feedback', np !== cp ? 'Passwords do not match.' : null);
            }

            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('oldPassword').addEventListener('input', () => {
                    const v = document.getElementById('oldPassword').value;
                    setFeedback('oldPassword', 'old-feedback', v ? null : '');
                });
                document.getElementById('newPassword').addEventListener('input', () => {
                    const v = document.getElementById('newPassword').value;
                    if (!v) { setFeedback('newPassword','new-feedback',''); return; }
                    setFeedback('newPassword','new-feedback', STRONG_PASSWORD_RE.test(v) ? null : 'Min 8 chars with uppercase, lowercase, number, and symbol.');
                    validateConfirm();
                });
                document.getElementById('confirmPassword').addEventListener('input', validateConfirm);

                // Toggle password visibility
                function makeToggle(btnId, inputId) {
                    document.getElementById(btnId).addEventListener('click', () => {
                        const inp = document.getElementById(inputId);
                        const isText = inp.type === 'text';
                        inp.type = isText ? 'password' : 'text';
                        document.querySelector('#'+btnId+' i').className = isText ? 'bi bi-eye text-muted' : 'bi bi-eye-slash text-muted';
                    });
                }
                makeToggle('toggleOld', 'oldPassword');
                makeToggle('toggleNew', 'newPassword');
                makeToggle('toggleConfirm', 'confirmPassword');

                document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const data = Object.fromEntries(new FormData(e.target).entries());
                    const errorDiv = document.getElementById('change-error');
                    const successDiv = document.getElementById('change-success');
                    errorDiv.classList.add('d-none');
                    successDiv.classList.add('d-none');

                    if (data.newPassword !== data.confirmPassword) {
                        setFeedback('confirmPassword', 'confirm-feedback', 'Passwords do not match.');
                        return;
                    }
                    if (!STRONG_PASSWORD_RE.test(data.newPassword)) {
                        setFeedback('newPassword', 'new-feedback', 'Min 8 chars with uppercase, lowercase, number, and symbol.');
                        return;
                    }

                    try {
                        const response = await fetch('/api/users/change-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                        if (response.ok) {
                            successDiv.querySelector('span').textContent = 'Password changed! Redirecting to login...';
                            successDiv.classList.remove('d-none');
                            setTimeout(() => window.location.href = '/login?info=Login with new password to continue', 2000);
                        } else {
                            const ct = response.headers.get('content-type');
                            let msg = 'Update failed. Please check your credentials.';
                            if (ct && ct.includes('application/json')) { const e = await response.json(); msg = e.message || msg; } else { msg = await response.text(); }
                            errorDiv.querySelector('span').textContent = msg;
                            errorDiv.classList.remove('d-none');
                        }
                    } catch (err) {
                        errorDiv.querySelector('span').textContent = 'An error occurred. Please try again.';
                        errorDiv.classList.remove('d-none');
                    }
                });
            });
        </script>
    </section>
</body>
</html>
