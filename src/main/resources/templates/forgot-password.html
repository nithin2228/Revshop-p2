<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main-layout(~{::section})}">
<body>
    <section class="auth-section">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                    <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-info bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;">
                                <i class="bi bi-shield-lock text-info fs-2"></i>
                            </div>
                            <h2 class="fw-bold mb-1" style="font-family:'Outfit',sans-serif;">Reset Password</h2>
                            <p class="text-muted mb-0">Verify your identity to set a new password</p>
                        </div>

                        <div id="forgot-error" class="alert alert-danger d-flex align-items-center gap-2 d-none" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i><span></span>
                        </div>
                        <div id="forgot-success" class="alert alert-success d-flex align-items-center gap-2 d-none" role="alert">
                            <i class="bi bi-check-circle-fill"></i><span></span>
                        </div>

                        <form id="forgotForm" novalidate>
                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
                                </div>
                                <div class="text-danger small mt-1" id="email-feedback"></div>
                            </div>

                            <!-- Security Question -->
                            <div class="mb-3">
                                <label for="securityQuestionId" class="form-label fw-semibold">Security Question</label>
                                <select id="securityQuestionId" name="securityQuestionId" class="form-select" required>
                                    <option value="">Select a question...</option>
                                    <option th:each="q : ${securityQuestions}"
                                            th:value="${q.questionId}"
                                            th:text="${q.questionText}"></option>
                                </select>
                                <div class="text-danger small mt-1" id="sq-feedback"></div>
                            </div>

                            <!-- Security Answer -->
                            <div class="mb-3">
                                <label for="securityAnswer" class="form-label fw-semibold">Security Answer</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-shield-check text-muted"></i></span>
                                    <input type="text" id="securityAnswer" name="securityAnswer" class="form-control" placeholder="Your Answer" required>
                                </div>
                                <div class="text-danger small mt-1" id="sa-feedback"></div>
                            </div>

                            <!-- New Password -->
                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-semibold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-muted"></i></span>
                                    <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="Min 8 chars with uppercase, number &amp; symbol"
                                           pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&amp;+=_!]).{8,}$" required>
                                    <button class="btn btn-light border" type="button" id="toggleNew"><i class="bi bi-eye text-muted"></i></button>
                                </div>
                                <div class="text-danger small mt-1" id="new-feedback"></div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">Confirm New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-muted"></i></span>
                                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter new password" required>
                                    <button class="btn btn-light border" type="button" id="toggleConfirm"><i class="bi bi-eye text-muted"></i></button>
                                </div>
                                <div class="text-danger small mt-1" id="confirm-feedback"></div>
                            </div>

                            <button type="submit" class="btn btn-info w-100 py-2 fw-bold fs-6 rounded-3 text-white">
                                <i class="bi bi-arrow-clockwise me-2"></i>Reset Password
                            </button>
                        </form>

                        <div class="text-center mt-4 pt-3 border-top">
                            <a th:href="@{/login}" class="text-primary fw-semibold text-decoration-none">
                                <i class="bi bi-arrow-left me-1"></i>Back to Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const STRONG_PASSWORD_RE = /^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=_!]).{8,}$/;
            const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            function setFeedback(inputId, feedbackId, message) {
                const el = document.getElementById(inputId);
                const fb = document.getElementById(feedbackId);
                if (message) {
                    el.classList.add('is-invalid'); el.classList.remove('is-valid');
                    fb.textContent = message;
                } else if (el.value) {
                    el.classList.remove('is-invalid'); el.classList.add('is-valid');
                    fb.textContent = '';
                } else {
                    el.classList.remove('is-invalid', 'is-valid');
                    fb.textContent = '';
                }
            }

            function validateConfirm() {
                const np = document.getElementById('newPassword').value;
                const cp = document.getElementById('confirmPassword').value;
                if (!cp) { setFeedback('confirmPassword','confirm-feedback',''); return; }
                setFeedback('confirmPassword', 'confirm-feedback', np !== cp ? 'Passwords do not match.' : null);
            }

            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('email').addEventListener('input', () => {
                    const v = document.getElementById('email').value;
                    if (!v) { setFeedback('email','email-feedback',''); return; }
                    setFeedback('email','email-feedback', EMAIL_RE.test(v) ? null : 'Please enter a valid email address.');
                });
                document.getElementById('securityQuestionId').addEventListener('change', () => {
                    setFeedback('securityQuestionId','sq-feedback', document.getElementById('securityQuestionId').value ? null : 'Please select a security question.');
                });
                document.getElementById('securityAnswer').addEventListener('input', () => {
                    const v = document.getElementById('securityAnswer').value;
                    setFeedback('securityAnswer','sa-feedback', v.length >= 2 ? null : (v ? 'Answer is too short.' : ''));
                });
                document.getElementById('newPassword').addEventListener('input', () => {
                    const v = document.getElementById('newPassword').value;
                    if (!v) { setFeedback('newPassword','new-feedback',''); return; }
                    setFeedback('newPassword','new-feedback', STRONG_PASSWORD_RE.test(v) ? null : 'Min 8 chars with uppercase, lowercase, number, and symbol.');
                    validateConfirm();
                });
                document.getElementById('confirmPassword').addEventListener('input', validateConfirm);

                function makeToggle(btnId, inputId) {
                    document.getElementById(btnId).addEventListener('click', () => {
                        const inp = document.getElementById(inputId);
                        const isText = inp.type === 'text';
                        inp.type = isText ? 'password' : 'text';
                        document.querySelector('#'+btnId+' i').className = isText ? 'bi bi-eye text-muted' : 'bi bi-eye-slash text-muted';
                    });
                }
                makeToggle('toggleNew', 'newPassword');
                makeToggle('toggleConfirm', 'confirmPassword');

                document.getElementById('forgotForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const data = Object.fromEntries(new FormData(e.target).entries());
                    const errorDiv = document.getElementById('forgot-error');
                    const successDiv = document.getElementById('forgot-success');
                    errorDiv.classList.add('d-none');
                    successDiv.classList.add('d-none');

                    if (data.newPassword !== data.confirmPassword) {
                        setFeedback('confirmPassword', 'confirm-feedback', 'Passwords do not match.');
                        return;
                    }
                    try {
                        const response = await fetch('/api/users/forgot-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                        if (response.ok) {
                            successDiv.querySelector('span').textContent = 'Password reset! Redirecting to login...';
                            successDiv.classList.remove('d-none');
                            setTimeout(() => window.location.href = '/login', 2000);
                        } else {
                            const err = await response.json();
                            errorDiv.querySelector('span').textContent = err.message || 'Reset failed. Please check your answers.';
                            errorDiv.classList.remove('d-none');
                        }
                    } catch (err) {
                        errorDiv.querySelector('span').textContent = 'An error occurred. Please try again.';
                        errorDiv.classList.remove('d-none');
                    }
                });
            });
        </script>
    </section>
</body>
</html>
