<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main-layout(~{::section})}">
<body>
    <section class="auth-section">
        <div class="container py-5">
            <div class="row justify-content-center align-items-center min-vh-75">
                <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                    <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;">
                                <i class="bi bi-person-circle text-primary fs-2"></i>
                            </div>
                            <h2 class="fw-bold mb-1" style="font-family:'Outfit',sans-serif;">Welcome Back</h2>
                            <p class="text-muted mb-0">Sign in to your RevShop account</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span>Invalid email or password. Please try again.</span>
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
                            <i class="bi bi-check-circle-fill"></i>
                            <span>You have been logged out successfully.</span>
                        </div>
                        <div th:if="${param.info}" class="alert alert-info d-flex align-items-center gap-2" role="alert">
                            <i class="bi bi-info-circle-fill"></i>
                            <span th:text="${param.info}">Info message.</span>
                        </div>

                        <form id="loginForm" th:action="@{/perform_login}" method="post" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" id="username" name="username" class="form-control border-start-0 ps-0"
                                           placeholder="name@example.com" required>
                                </div>
                                <div class="invalid-feedback-custom text-danger small mt-1" id="username-feedback"></div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" id="password" name="password" class="form-control border-start-0 ps-0"
                                           placeholder="••••••••" required>
                                    <button class="btn btn-light border border-start-0" type="button" id="togglePassword">
                                        <i class="bi bi-eye text-muted"></i>
                                    </button>
                                </div>
                                <div class="invalid-feedback-custom text-danger small mt-1" id="password-feedback"></div>
                            </div>

                            <div class="d-flex justify-content-end mb-3">
                                <a th:href="@{/forgot-password}" class="text-primary text-decoration-none small fw-semibold">Forgot password?</a>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-6 rounded-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </button>
                        </form>

                        <div class="text-center mt-4 pt-3 border-top">
                            <p class="text-muted mb-0">Don't have an account?
                                <a th:href="@{/register}" class="text-primary fw-semibold text-decoration-none">Create Account</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Live validation for login
            document.addEventListener('DOMContentLoaded', () => {
                const username = document.getElementById('username');
                const password = document.getElementById('password');

                function showError(input, feedbackId, message) {
                    input.classList.add('is-invalid');
                    input.classList.remove('is-valid');
                    document.getElementById(feedbackId).textContent = message;
                }
                function showValid(input, feedbackId) {
                    input.classList.remove('is-invalid');
                    input.classList.add('is-valid');
                    document.getElementById(feedbackId).textContent = '';
                }
                function clearState(input, feedbackId) {
                    input.classList.remove('is-invalid', 'is-valid');
                    document.getElementById(feedbackId).textContent = '';
                }

                username.addEventListener('input', () => {
                    if (!username.value) { clearState(username, 'username-feedback'); return; }
                    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRe.test(username.value)) showError(username, 'username-feedback', 'Please enter a valid email address.');
                    else showValid(username, 'username-feedback');
                });

                password.addEventListener('input', () => {
                    if (!password.value) { clearState(password, 'password-feedback'); return; }
                    if (password.value.length < 1) showError(password, 'password-feedback', 'Password is required.');
                    else showValid(password, 'password-feedback');
                });

                // Toggle password visibility
                document.getElementById('togglePassword').addEventListener('click', () => {
                    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                    password.setAttribute('type', type);
                    document.querySelector('#togglePassword i').className = type === 'text' ? 'bi bi-eye-slash text-muted' : 'bi bi-eye text-muted';
                });
            });
        </script>
    </section>
</body>
</html>
