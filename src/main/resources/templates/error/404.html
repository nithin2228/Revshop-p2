<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main-layout(~{::section})}">
<body>
    <section>
        <div class="container py-5">
            <div class="row justify-content-center text-center">
                <div class="col-12 col-md-7">
                    <div class="py-5">
                        <div class="display-1 fw-bold text-primary mb-3">404</div>
                        <div class="mb-4">
                            <i class="bi bi-search" style="font-size: 5rem; color: #6366f1; opacity: 0.4;"></i>
                        </div>
                        <h2 class="fw-bold mb-2" style="font-family: 'Outfit', sans-serif;">Page Not Found</h2>
                        <p class="text-muted mb-4 fs-5">Oops! The page or product you're looking for doesn't exist or has been moved.</p>
                        <div class="d-flex gap-3 justify-content-center">
                            <a href="/" class="btn btn-primary btn-lg px-4 rounded-3 fw-semibold">
                                <i class="bi bi-house me-2"></i>Back to Home
                            </a>
                            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg px-4 rounded-3 fw-semibold">
                                <i class="bi bi-arrow-left me-2"></i>Go Back
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
